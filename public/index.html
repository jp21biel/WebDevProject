<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meal Planner</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="style.css">

  <script src=""></script>
</head>

<body>
  <header>
    <div class="px-3 py-2 text-bg-dark border-bottom header-top-row">
      <div class="container">
        <div class="d-flex flex-wrap align-items-center justify-content-center ">
          <a href="/" class="d-flex align-items-center my-2 my-lg-0 me-lg-auto text-white text-decoration-none">
          </a>

          <ul class="nav col-12 col-lg-auto my-2 justify-content-center my-md-0 text-small">
            <li><a href="#" class="nav-link text-secondary">Home</a></li>
            <li><a href="#" class="nav-link text-white"> Track</a></li>
            <li><a href="#" class="nav-link text-white">Meals</a></li>
            <li><a href="#" class="nav-link text-white">Community</a></li>
            <li><a href="#" class="nav-link text-white">Diet</a></li>
            <li>
              <button type="button" class="btn btn-light text-dark me-2">Login</button>
                <button type="button" class="btn btn-primary">Sign-up</button>
            </li>
          </ul>
        </div>
      </div>
    </div>

    <div class="px-3 py-2 border-bottom mb-3">
      <div class="container d-flex flex-wrap justify-content-center">
        <div class="d-flex gap-2">
          <input type="search" class="form-control" id="ingr" placeholder="Enter an Ingredient..." aria-label="Search">
          <button type="button" class="btn btn-success" id="submit">Add</button>
          <button type="button" class="btn btn-outline-secondary" id="clear">Clear Selection</button>

        </div>
      </div>
    </div>
  </header>

  <main>
    <h1 class="text-center display-4 fw-bold">Welcome to Meal Planner!</h1>
    <p class="text-muted text-center">Add what you have and we'll find recipes for you.</p>

    <section class="mb-5">
      <h2 class="fw-bold">Your Ingredients</h2> 
      <div id="chosen" class="d-flex flex-column gap-2 mt-3" style="max-width: 400px;"></div>    
    </section>

    <hr>

    <section class="mb-5">
      <h2 class="fw-bold mb-4">Your Calorie Dashboard</h2>

      <div class="row g-3 mb-4">
        <div class="col-md-6">
          <div class="card text-center p-3 h-100">
            <div class="card-body">
              <h5 class="card-title text-muted">Calories Consumed Today</h5>
              <p class="display-5 fw-bold text-success">--</p>
              <p class="text-muted small">kcal eaten</p>
            </div>
          </div>
        </div>
        <div class="col-md-6">
          <div class="card text-center p-3 h-100">
            <div class="card-body">
              <h5 class="card-title text-muted">Calories Burned Today</h5>
              <p class="display-5 fw-bold text-danger">--</p>
              <p class="text-muted small">kcal burned via activity</p>
            </div>
          </div>
        </div>
      </div>
       <!-- id=calpraph  for updateGraph() -->

       <div class="card p-3">
        <div class="card-body">
          <h5 class="card-title fw-bold mb-3">Weekly Progress</h5>
          <canvas id="calgraph"></canvas>
        </div>
       </div>

       <div class="mt-3">
        <button type="button" class="btn btn-success" onclick="updateGraph()">Sync Watch Data</button>
       </div>
    </section>
  </main>

  <script src="script.js" defer></script>
</body>

</html>
